name: hire_pro
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.0+1

# enviorment
environment:
  sdk: ^3.11.3

# dependecies for client
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.1.0
  supabase_flutter: ^2.16.0
  flutter_dotenv: ^6.0.1
  hugeicons_pro: ^0.0.3
  go_router: ^17.3.0
  flutter_riverpod: ^3.3.2
  flutter_svg: ^2.3.0
  file_picker: ^8.1.7


# dependecies for developer
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0



# asset management
flutter:

  uses-material-design: true

  assets:
    - .env                                    # load env file
    - assets/image/                           # images
 
  fonts:
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/PlusJakartaSans-ExtraLightItalic.ttf
          weight: 200
          style: italic
        - asset: assets/fonts/PlusJakartaSans-Light.ttf
          weight: 300
        - asset: assets/fonts/PlusJakartaSans-LightItalic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/PlusJakartaSans-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/PlusJakartaSans-BoldItalic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/PlusJakartaSans-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/PlusJakartaSans-ExtraBoldItalic.ttf
          weight: 800
          style: italic


